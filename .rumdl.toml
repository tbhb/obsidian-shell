[global]
disable = [
  "MD013", # Line length
  "MD033", # Inline HTML
]
respect_gitignore = true
# CHANGELOG.md is generated by release-please and uses its own markdown
# conventions (`*` list markers, leading blank lines); don't fight it.
exclude = [
  ".git",
  ".vale",
  "CHANGELOG.md",
  "coverage",
  "dist",
  "node_modules",
  "tmp",
]

[MD003]
style = "atx"

[MD004]
style = "dash"

[MD025]
front_matter_title = ""

[MD046]
style = "fenced"

[MD048]
style = "backtick"
