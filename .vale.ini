StylesPath = .vale
MinAlertLevel = suggestion
Vocab = obsidian-shell
Packages = Google, write-good, proselint, \
  https://github.com/tbhb/vale-ai-tells/releases/download/v1.6.3/ai-tells.zip, \
  https://github.com/tbhb/vale-ai-tells/releases/download/v1.6.3/ai-tells-commits.zip, \
  https://github.com/tbhb/vale-ai-tells/releases/download/v1.6.3/ai-tells-experimental.zip,

[formats]
COMMIT_EDITMSG = md
# `.ts` / `.tsx` are natively recognized as code and auto-scoped to
# comments. `.mts` and `.cts` are not, so map them to `ts`. Treating `ts`
# as `md` lets markdown-aware rules run inside TSDoc and block comments.
mts = ts
cts = ts
ts = md

[*.{md,mdx}]
BasedOnStyles = Vale, Google, proselint, write-good, \
  ai-tells, ai-tells-experimental, \
  obsidian-shell
ai-tells.AIAdjectiveNounPairs = error
ai-tells-experimental.AverageSentenceLength = error
ai-tells-experimental.ComplexWordDensity = error
ai-tells-experimental.ContentDuplication = error
ai-tells-experimental.ContractionAvoidance = error
