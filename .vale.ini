[{**/node_modules/**/*.md,.vale/**/*.md,tmp/**/*.md}]
BasedOnStyles =

# TypeScript source: Vale auto-scopes to comment bodies for recognized
# code formats. `.mts` / `.cts` are mapped to `ts` in `[formats]` above.
# Covers both block comments (`/* */`, TSDoc `/** */`) and line (`//`).
[*.{ts,mts,cts}]
BasedOnStyles = Vale, Google, proselint, write-good, \
  ai-tells, \
  obsidian-shell
ai-tells.AIAdjectiveNounPairs = error
obsidian-shell.Colons = NO
obsidian-shell.HeadingTitleCase = NO
obsidian-shell.Parens = NO
Google.Acronyms = error
Google.Colons = NO
Google.Contractions = error
Google.Ellipses = error
Google.FirstPerson = error
Google.HeadingPunctuation = NO
Google.Headings = NO
Google.OxfordComma = error
Google.Parens = NO
Google.Passive = error
Google.Ranges = error
Google.Semicolons = error
Google.Spelling = error
Google.We = error
Google.Will = error
# `WordList` misfires on API verbs like `disable` (suggests "turn off")
# and `touch` (suggests "tap") that mean something specific in code.
Google.WordList = NO
proselint.Annotations = NO
proselint.P-Value = error
write-good.Cliches = error
# E-Prime bans all forms of "to be". Useful for marketing copy; too
# aggressive for code comments that naturally describe what something
# `is` or `are`.
write-good.E-Prime = NO
write-good.Illusions = error
write-good.Passive = error
write-good.TooWordy = error
write-good.Weasel = error
