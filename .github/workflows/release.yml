---
name: release

on:
  push:
    branches:
      - main
      - beta

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  # Opt JS-based actions into the Node 24 runtime early (the default flip
  # happens 2026-06-02). Silences deprecation warnings on older actions
  # like googleapis/release-please-action@v4.4.0 which still target Node 20.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release-please:
    name: release-please (${{ github.ref_name }})
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      pr: ${{ steps.release.outputs.pr }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38  # v4.4.0
        with:
          target-branch: ${{ github.ref_name }}
          config-file: >-
            ${{ github.ref_name == 'beta'
            && '.github/release-please-config.beta.json'
            || '.github/release-please-config.json' }}
          manifest-file: .github/release-please-manifest.json

      # release-please can update values in manifest.json via `extra-files`,
      # but it cannot *append a new key* to versions.json (which maps each
      # plugin version to its minAppVersion). We sync versions.json here on
      # the release PR branch, so the version bump and versions.json update
      # land together in the same release commit.
      - name: Checkout
        if: ${{ steps.release.outputs.pr }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync versions.json on release PR branch
        if: ${{ steps.release.outputs.pr }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pass the PR JSON as a plain string — GitHub Actions evaluates env
          # expressions even when the step's `if:` is false, so using
          # `fromJSON()` here would blow up at template-eval time whenever
          # release-please doesn't open a PR. Parse it inside the run script
          # instead.
          PR_JSON: ${{ steps.release.outputs.pr }}
        run: |
          set -euo pipefail
          PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number')
          BRANCH=$(gh pr view "$PR_NUMBER" --json headRefName --jq .headRefName)
          git fetch origin "$BRANCH"
          git checkout "$BRANCH"

          NEW_VERSION=$(jq -r '.version' manifest.json)
          MIN_APP_VERSION=$(jq -r '.minAppVersion' manifest.json)

          if jq -e --arg v "$NEW_VERSION" 'has($v)' versions.json > /dev/null; then
            echo "versions.json already contains $NEW_VERSION — nothing to do."
            exit 0
          fi

          jq --arg v "$NEW_VERSION" --arg m "$MIN_APP_VERSION" \
            '. + {($v): $m}' versions.json > versions.json.tmp
          mv versions.json.tmp versions.json

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add versions.json
          git commit -m "chore: sync versions.json to ${NEW_VERSION}"
          git push origin "$BRANCH"

  publish-release:
    name: build + upload assets
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    # Override workflow-level permissions for least privilege. This job needs:
    #   - contents: write  →  to upload assets to the GitHub release
    #   - id-token: write  →  to request the OIDC token that sigstore uses
    #                         for keyless signing of the attestation
    #   - attestations: write  →  to write the attestation to the repo
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v5.0.0
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build plugin
        run: pnpm run build

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          # Attest the built runtime assets. Source maps are not included as
          # attestation subjects — they're derived files, and attesting them
          # adds signing overhead without changing what a verifier can
          # prove about the runtime bundle.
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Mandatory assets: main.js, manifest.json, styles.css.
          # Optional: source maps. Vite only emits styles.css.map when the
          # CSS pipeline supports it, so we glob and upload what's present.
          assets=(main.js manifest.json styles.css)
          for map in main.js.map styles.css.map; do
            if [ -f "$map" ]; then
              assets+=("$map")
            fi
          done
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            "${assets[@]}" \
            --clobber
