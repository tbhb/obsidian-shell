---
name: release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  # Opt JS-based actions into the Node 24 runtime early (the default flip
  # happens 2026-06-02). Silences deprecation warnings on any transitive
  # action that still targets Node 20.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      pr: ${{ steps.release.outputs.pr }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7  # v5.0.0
        with:
          target-branch: main
          config-file: .github/release-please-config.json
          manifest-file: .github/release-please-manifest.json

      # release-please can update values in manifest.json via `extra-files`,
      # but it cannot *append a new key* to versions.json (which maps each
      # plugin version to its minAppVersion). We sync versions.json here on
      # the release PR branch, so the version bump and versions.json update
      # land together in the same release commit.
      - name: Checkout
        if: ${{ steps.release.outputs.pr }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync versions.json on release PR branch
        if: ${{ steps.release.outputs.pr }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pass the PR JSON as a plain string — GitHub Actions evaluates env
          # expressions even when the step's `if:` is false, so using
          # `fromJSON()` here would blow up at template-eval time whenever
          # release-please doesn't open a PR. Parse it inside the run script
          # instead.
          PR_JSON: ${{ steps.release.outputs.pr }}
        run: |
          set -euo pipefail
          PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number')
          BRANCH=$(gh pr view "$PR_NUMBER" --json headRefName --jq .headRefName)
          git fetch origin "$BRANCH"
          git checkout "$BRANCH"

          NEW_VERSION=$(jq -r '.version' manifest.json)
          MIN_APP_VERSION=$(jq -r '.minAppVersion' manifest.json)

          if jq -e --arg v "$NEW_VERSION" 'has($v)' versions.json > /dev/null; then
            echo "versions.json already contains $NEW_VERSION — nothing to do."
            exit 0
          fi

          jq --arg v "$NEW_VERSION" --arg m "$MIN_APP_VERSION" \
            '. + {($v): $m}' versions.json > versions.json.tmp
          mv versions.json.tmp versions.json

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add versions.json
          git commit -m "chore: sync versions.json to ${NEW_VERSION}"
          git push origin "$BRANCH"

  build-natives:
    name: native (${{ matrix.platform }})
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-latest
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
          - platform: darwin-arm64
            runner: macos-14
          - platform: darwin-x64
            runner: macos-15-intel
          - platform: win32-x64
            runner: windows-latest
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v5.0.0

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: 22.22.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild node-pty against Electron 39 headers
        run: pnpm run rebuild:native

      # Copy each native artifact that node-pty emits into a staging directory
      # with the platform/arch appended to the filename. The release layout is
      # flat (GitHub release assets cannot carry directory structure), so the
      # bundled node-pty loader in main.js picks files by suffix at runtime.
      - name: Stage natives
        run: |
          set -euo pipefail
          suffix='${{ matrix.platform }}'
          src='node_modules/node-pty/build/Release'
          mkdir -p staged
          for f in "$src"/*.node; do
            base=$(basename "$f" .node)
            cp "$f" "staged/${base}-${suffix}.node"
          done
          if [ -f "$src/spawn-helper" ]; then
            cp "$src/spawn-helper" "staged/spawn-helper-${suffix}"
          fi
          ls -la staged

      - name: Upload native artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: natives-${{ matrix.platform }}
          path: staged/
          retention-days: 7
          if-no-files-found: error

  publish-release:
    name: build + upload assets
    needs: [release-please, build-natives]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    # Override workflow-level permissions for least privilege. This job needs:
    #   - contents: write  →  to upload assets to the GitHub release
    #   - id-token: write  →  to request the OIDC token that sigstore uses
    #                         for keyless signing of the attestation
    #   - attestations: write  →  to write the attestation to the repo
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v5.0.0

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: 22.22.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build plugin
        run: pnpm run build

      - name: Download native artifacts
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53  # v6.0.0
        with:
          path: natives/
          pattern: natives-*
          merge-multiple: true

      - name: Stage release assets
        run: |
          set -euo pipefail
          cp -v natives/* .
          ls -la ./*.node ./spawn-helper-* 2>/dev/null || true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          # Attest the runtime assets and every platform-specific native that
          # ships in the release. Source maps are derived files, so they are
          # omitted from attestation subjects. Helper binaries are attested
          # because they run in-process via node-pty's fork path.
          subject-path: |
            main.js
            manifest.json
            styles.css
            *.node
            spawn-helper-*

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Mandatory assets: main.js, manifest.json, styles.css, and every
          # platform-specific native produced by the build-natives matrix.
          # Source maps ship when Vite emits them. Vite only emits
          # styles.css.map when the CSS pipeline supports it, so we glob and
          # upload what's present.
          assets=(main.js manifest.json styles.css)
          for map in main.js.map styles.css.map; do
            if [ -f "$map" ]; then
              assets+=("$map")
            fi
          done
          for native in ./*.node ./spawn-helper-*; do
            if [ -f "$native" ]; then
              assets+=("${native#./}")
            fi
          done
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            "${assets[@]}" \
            --clobber
